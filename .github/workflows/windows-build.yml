name: Build Windows App
on:
  push:
    branches: [ master, main, Algorithm_of_Hau ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 1. Lấy mã nguồn từ GitHub về máy chủ
      uses: actions/checkout@v4

    - name: 2. Cài đặt Qt 6.4.2 (MinGW 64-bit)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.2'
        arch: 'win64_mingw'
        cache: true          # Tránh tải lại Qt mỗi lần (~1GB)

    - name: 3. Cấu hình và Biên dịch bằng CMake
      run: |
        cmake -B build -G "MinGW Makefiles" `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        cmake --build build --config Release --parallel

    - name: 4. Thu thập file thực thi và đóng gói DLL
      run: |
        New-Item -ItemType Directory -Force -Path build_result

        # Copy exe
        $exe = Get-ChildItem -Path "build" -Recurse -Filter "SolveLinearProgramming.exe" |
               Select-Object -First 1
        Copy-Item $exe.FullName -Destination "build_result\"
        Write-Host "Đã copy exe: $($exe.FullName)"

        # Tìm Qt root
        $windeployqt = Get-ChildItem -Path "D:\a" -Recurse -Filter "windeployqt.exe" `
                           -ErrorAction SilentlyContinue | Select-Object -First 1
        $qtBin     = $windeployqt.DirectoryName
        $qtRoot    = Split-Path $qtBin -Parent
        $qtPlugins = "$qtRoot\plugins"
        Write-Host "Qt root: $qtRoot"

        # Kiểm tra qwindows.dll có tồn tại không
        $qwindows = "$qtPlugins\platforms\qwindows.dll"
        Write-Host "qwindows.dll exists: $(Test-Path $qwindows)"
        Write-Host "qwindows path: $qwindows"

        # Copy platform plugin
        New-Item -ItemType Directory -Force -Path "build_result\platforms"
        Copy-Item $qwindows -Destination "build_result\platforms\" -Verbose

        # Copy tất cả Qt DLL cần thiết từ bin
        $qtDlls = @(
            "Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll",
            "libgcc_s_seh-1.dll", "libstdc++-6.dll", "libwinpthread-1.dll"
        )
        foreach ($dll in $qtDlls) {
            $src = "$qtBin\$dll"
            if (Test-Path $src) {
                Copy-Item $src -Destination "build_result\" -Verbose
            } else {
                Write-Warning "Không tìm thấy: $dll"
            }
        }

        # Copy styles plugin (cần cho Qt6Widgets)
        New-Item -ItemType Directory -Force -Path "build_result\styles"
        $stylesDll = "$qtPlugins\styles\qwindowsvistastyle.dll"
        if (Test-Path $stylesDll) {
            Copy-Item $stylesDll -Destination "build_result\styles\" -Verbose
        }

        Write-Host "=== Nội dung build_result ==="
        Get-ChildItem -Path "build_result" -Recurse | Select-Object FullName
            
    - name: 5. Đóng gói thành file ZIP gửi về cho bạn
      uses: actions/upload-artifact@v4
      with:
        name: PhanMemQHTT-Qt6-Windows
        path: build_result/
        retention-days: 7    # Tự xóa sau 7 ngày để tiết kiệm storage
