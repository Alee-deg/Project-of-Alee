name: Build Windows App

on:
  push:
    branches: [ master, main, Algorithm_of_Hau ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 1. Lấy mã nguồn từ GitHub về máy chủ
      uses: actions/checkout@v4

    - name: 2. Cài đặt Qt 6.4.2 (MinGW 64-bit)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.2'
        arch: 'win64_mingw'

    - name: 3. Cấu hình và Biên dịch bằng CMake
      run: |
        cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
        
    - name: 4. Thu thập file thực thi và đóng gói DLL
      run: |
        # Tạo thư mục chứa sản phẩm
        New-Item -ItemType Directory -Force -Path build_result
        
        # Copy file exe
        if (Test-Path "build\SolveLinearProgramming.exe") {
            Copy-Item "build\SolveLinearProgramming.exe" -Destination "build_result\"
        } else {
            Copy-Item "build\Release\SolveLinearProgramming.exe" -Destination "build_result\"
        }
        
        # XÓA TẬN GỐC biến môi trường gây mù đường cho windeployqt
        Remove-Item Env:\QT_PLUGIN_PATH -ErrorAction SilentlyContinue
        
        # Di chuyển hẳn vào trong thư mục chứa file exe rồi mới gọi windeployqt
        cd build_result
        windeployqt --release --no-translations --compiler-runtime SolveLinearProgramming.exe
        
    - name: 5. Đóng gói thành file ZIP gửi về cho bạn
      uses: actions/upload-artifact@v4
      with:
        name: PhanMemQHTT-Qt6-Windows
        path: build_result/
