name: Build Windows App

on:
  push:
    branches: [ master, main, Algorithm_of_Hau ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 1. Lấy mã nguồn từ GitHub về máy chủ
      uses: actions/checkout@v4

    - name: 2. Cài đặt Qt 6.4.2 (MinGW 64-bit)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.2'
        arch: 'win64_mingw'

    - name: 3. Cấu hình và Biên dịch bằng CMake
      run: |
        cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
        
    - name: 4. Thu thập file thực thi và đóng gói DLL
      run: |
        # 1. Tạo thư mục chứa sản phẩm
        New-Item -ItemType Directory -Force -Path build_result
        
        # 2. Copy file exe
        if (Test-Path "build\SolveLinearProgramming.exe") {
            Copy-Item "build\SolveLinearProgramming.exe" -Destination "build_result\"
        } else {
            Copy-Item "build\Release\SolveLinearProgramming.exe" -Destination "build_result\"
        }
        
        # 3. Lấy đường dẫn TUYỆT ĐỐI của file exe
        $exeFullPath = (Resolve-Path "build_result\SolveLinearProgramming.exe").Path
        
        # 4. TRICK HỆ THỐNG: Tìm thư mục 'bin' gốc của Qt và chui hẳn vào đó
        $qtBinDir = Split-Path (Get-Command windeployqt).Definition -Parent
        Write-Host "Di chuyen he thong vao thu muc goc cua Qt: $qtBinDir"
        Set-Location -Path $qtBinDir
        
        # 5. Khởi động windeployqt từ chính nhà của nó
        .\windeployqt.exe --release --no-translations --compiler-runtime $exeFullPath
        
    - name: 5. Đóng gói thành file ZIP gửi về cho bạn
      uses: actions/upload-artifact@v4
      with:
        name: PhanMemQHTT-Qt6-Windows
        path: build_result/
