name: Build Windows App
on:
  push:
    branches: [ master, main, Algorithm_of_Hau ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 1. Lấy mã nguồn từ GitHub về máy chủ
      uses: actions/checkout@v4

    - name: 2. Cài đặt Qt 6.4.2 (MinGW 64-bit)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.2'
        arch: 'win64_mingw'
        cache: true          # Tránh tải lại Qt mỗi lần (~1GB)

    - name: 3. Cấu hình và Biên dịch bằng CMake
      run: |
        cmake -B build -G "MinGW Makefiles" `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        cmake --build build --config Release --parallel

    - name: 4. Thu thập file thực thi và đóng gói DLL
      run: |
        New-Item -ItemType Directory -Force -Path build_result

        $exe = Get-ChildItem -Path "build" -Recurse -Filter "SolveLinearProgramming.exe" |
               Select-Object -First 1
        Copy-Item $exe.FullName -Destination "build_result\"
        Write-Host "Đã copy: $($exe.FullName)"

        # Path Qt đã biết từ log: D:\a\Project-of-Alee\Project-of-Alee\Qt\6.4.2\mingw_64
        $qtBin     = "D:\a\Project-of-Alee\Project-of-Alee\Qt\6.4.2\mingw_64\bin"
        $qtPlugins = "D:\a\Project-of-Alee\Project-of-Alee\Qt\6.4.2\mingw_64\plugins"

        # Dùng biến môi trường thay vì hardcode (linh hoạt hơn)
        $qtRoot    = Split-Path (Split-Path $env:Qt6_DIR -Parent) -Parent
        $qtBin     = "$qtRoot\bin"
        $qtPlugins = "$qtRoot\plugins"

        Write-Host "Qt root: $qtRoot"
        Write-Host "Plugins: $qtPlugins"

        # Set đúng plugin path trước khi chạy windeployqt
        $env:QT_PLUGIN_PATH = $qtPlugins

        & "$qtBin\windeployqt.exe" `
            --release `
            --no-translations `
            --compiler-runtime `
            --plugindir "build_result\plugins" `
            "build_result\SolveLinearProgramming.exe"

    - name: 5. Đóng gói thành file ZIP gửi về cho bạn
      uses: actions/upload-artifact@v4
      with:
        name: PhanMemQHTT-Qt6-Windows
        path: build_result/
        retention-days: 7    # Tự xóa sau 7 ngày để tiết kiệm storage
