name: Build Windows App
on:
  push:
    branches: [ master, main, Algorithm_of_Hau ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 1. Lấy mã nguồn từ GitHub về máy chủ
      uses: actions/checkout@v4

    - name: 2. Cài đặt Qt 6.4.2 (MinGW 64-bit)
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.2'
        arch: 'win64_mingw'
        cache: true          # Tránh tải lại Qt mỗi lần (~1GB)

    - name: 3. Cấu hình và Biên dịch bằng CMake
      run: |
        cmake -B build -G "MinGW Makefiles" `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        cmake --build build --config Release --parallel

    - name: 4. Thu thập file thực thi và đóng gói DLL
      run: |
        New-Item -ItemType Directory -Force -Path build_result

        # Tìm file exe
        $exe = Get-ChildItem -Path "build" -Recurse -Filter "SolveLinearProgramming.exe" |
               Select-Object -First 1
        if (-not $exe) {
            Write-Error "Không tìm thấy SolveLinearProgramming.exe!"
            exit 1
        }
        Copy-Item $exe.FullName -Destination "build_result\"
        Write-Host "Đã copy: $($exe.FullName)"

        # Tìm windeployqt trực tiếp từ Qt installation
        $windeployqt = Get-ChildItem -Path "$env:RUNNER_TOOL_CACHE" -Recurse -Filter "windeployqt.exe" |
                       Where-Object { $_.FullName -like "*mingw*" -or $_.FullName -like "*msvc*" } |
                       Select-Object -First 1

        if (-not $windeployqt) {
            # Fallback: tìm toàn bộ ổ D
            $windeployqt = Get-ChildItem -Path "D:\a" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue |
                           Select-Object -First 1
        }

        Write-Host "windeployqt found: $($windeployqt.FullName)"

        # Xóa QT_PLUGIN_PATH để tránh xung đột
        $env:QT_PLUGIN_PATH = $null

        & "$($windeployqt.FullName)" --release --no-translations --compiler-runtime `
                                     "build_result\SolveLinearProgramming.exe"

    - name: 5. Đóng gói thành file ZIP gửi về cho bạn
      uses: actions/upload-artifact@v4
      with:
        name: PhanMemQHTT-Qt6-Windows
        path: build_result/
        retention-days: 7    # Tự xóa sau 7 ngày để tiết kiệm storage
